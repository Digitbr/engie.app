<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Rondas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-blue-900 text-white p-4 shadow-md flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold">Assistente Operacional</h1>
            <p class="text-xs text-blue-200">Preenchimento Rápido de Rondas</p>
        </div>
        <div class="w-10 h-10 bg-blue-700 rounded-full flex items-center justify-center border-2 border-white">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
        </main>

    <footer class="bg-white p-3 shadow-inner fixed bottom-0 w-full flex items-center gap-2">
        <div id="file-upload-container" class="hidden">
            <label for="foto-upload" class="cursor-pointer bg-gray-200 p-3 rounded-full hover:bg-gray-300 transition">
                📎
            </label>
            <input type="file" id="foto-upload" accept="image/*" multiple class="hidden">
        </div>
        
        <input type="text" id="user-input" class="flex-1 bg-gray-100 border border-gray-300 rounded-full px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Digite sua resposta..." autocomplete="off">
        
        <button id="send-btn" class="bg-blue-600 text-white rounded-full p-3 w-12 h-12 flex items-center justify-center hover:bg-blue-700 transition">
            ➤
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
